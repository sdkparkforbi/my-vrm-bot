<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>// CHA / SURVEY ADMIN //</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090c; --panel:#0e1014; --panel2:#131620; --line:#1f2330;
    --txt:#e6e8ef; --dim:#8b93a7; --cyan:#22d3ee; --violet:#8b5cf6; --magenta:#d946ef;
    --green:#22c55e; --red:#f43f5e; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:'Pretendard',system-ui,sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 18px 60px;}
  .top{display:flex;align-items:center;gap:14px;padding:10px 0 18px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap;}
  .brand{font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--green);font-size:15px;}
  .brand .sub{color:var(--cyan);}
  .who{margin-left:auto;font-size:13px;color:var(--dim);}
  .a{color:var(--cyan);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;}
  .a:hover{background:var(--panel2);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta{font-family:'JetBrains Mono',monospace;color:var(--dim);font-size:13px;margin-bottom:22px;}
  .gate{text-align:center;padding:70px 20px;}
  .gate p{color:var(--dim);margin-bottom:18px;}
  .btn{background:var(--violet);color:#fff;border:none;border-radius:9px;padding:11px 20px;font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .card .k{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;}
  .card .v{font-size:28px;font-weight:800;margin-top:6px;}
  .card .v small{font-size:14px;color:var(--dim);font-weight:500;}
  .section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:18px;}
  .section h2{font-size:14px;margin:0 0 14px;font-family:'JetBrains Mono',monospace;color:var(--cyan);}
  .daily{display:flex;align-items:flex-end;gap:5px;height:120px;}
  .daycol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;}
  .daybar{width:100%;background:linear-gradient(to top,var(--cyan),var(--violet));border-radius:3px 3px 0 0;min-height:2px;}
  .dayn{font-size:10px;color:var(--txt);font-family:'JetBrains Mono',monospace;}
  .dayd{font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .q{padding:12px 0;border-bottom:1px solid var(--line);}
  .q:last-child{border-bottom:none;}
  .qlab{font-size:14px;margin-bottom:3px;}
  .qmeta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:10px;}
  .bar{display:grid;grid-template-columns:84px 1fr 64px;align-items:center;gap:8px;margin-bottom:6px;}
  .blab{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .btrack{background:var(--panel2);border-radius:5px;height:20px;overflow:hidden;}
  .bfill{height:100%;border-radius:5px;min-width:2px;}
  .bval{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;}
  .bval small{color:var(--dim);}
  .txts{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;max-height:220px;overflow:auto;}
  .txts li{background:var(--panel2);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--txt);}
  .empty{color:var(--dim);text-align:center;padding:50px 0;}
  .foot{margin-top:24px;text-align:center;color:#3a4150;font-size:11px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="brand">// CHA / <span class="sub">SURVEY.ADMIN</span></span>
    <a class="a" href="/">← 봇으로</a>
    <a class="a" href="/dashboard" id="pub">공개 대시보드</a>
    <span class="who" id="who"></span>
  </div>
  <div id="app"><p class="empty">불러오는 중…</p></div>
  <div class="foot">// 관리자 전용 · 로그인 기반 접근 · BOT_ID 별 데이터</div>
</div>

<script>
  const API = '/api/school-api';
  const TOKEN_KEY = 'cha_interview_token';
  const USER_KEY = 'cha_interview_user';
  const PALETTE = ['#22d3ee','#8b5cf6','#d946ef','#f59e0b','#22c55e','#f43f5e','#3b82f6'];
  const bot = new URLSearchParams(location.search).get('bot');

  function token(){ return localStorage.getItem(TOKEN_KEY); }
  function userName(){ try{ return (JSON.parse(localStorage.getItem(USER_KEY)||'null')||{}).name; }catch(e){ return null; } }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  async function call(action, body){
    const r = await fetch(API+'?action='+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
    return r.json();
  }

  function gate(){
    document.getElementById('app').innerHTML =
      '<div class="gate"><p>관리자 대시보드입니다.<br>봇 사이트에서 <b>로그인</b> 후 다시 들어오세요.</p>'+
      '<a class="btn" href="/">봇으로 가서 로그인</a></div>';
  }

  function pct(n,t){ return t>0?Math.round(n*100/t):0; }

  function barChart(counts,total,base){
    const ent=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    if(!ent.length) return '<div class="qmeta">응답 없음</div>';
    const max=Math.max(...ent.map(e=>e[1]),1);
    const lab={yes:'예 👍',no:'아니오 👎'};
    return ent.map(([v,n],i)=>(
      '<div class="bar"><div class="blab">'+esc(lab[v]||v)+'</div>'+
      '<div class="btrack"><div class="bfill" style="width:'+(n/max*100)+'%;background:'+PALETTE[(base+i)%PALETTE.length]+'"></div></div>'+
      '<div class="bval">'+n+' <small>('+pct(n,total)+'%)</small></div></div>'
    )).join('');
  }

  function render(d){
    if(!d||!d.success){ document.getElementById('app').innerHTML='<p class="empty">데이터를 불러오지 못했어요.</p>'; return; }
    const qs=Object.entries(d.questions||{});
    const m=d.meta||{};
    // 종합 신뢰 (overall_trust 또는 마지막 yesno)
    let trust=null;
    const ov=qs.find(([k])=>/overall|trust|신뢰/i.test(k));
    const ovq=ov?ov[1]:null;
    if(ovq&&ovq.counts&&ovq.n){ trust=pct(ovq.counts.yes||0,ovq.n); }

    let daily='';
    const dl=(m.daily||[]);
    if(dl.length){
      const mx=Math.max(...dl.map(x=>x.n),1);
      daily='<div class="section"><h2>// DAILY_ACTIVITY</h2><div class="daily">'+
        dl.map(x=>'<div class="daycol"><div class="dayn">'+x.n+'</div>'+
          '<div class="daybar" style="height:'+(x.n/mx*90)+'px"></div>'+
          '<div class="dayd">'+esc(String(x.d).slice(5))+'</div></div>').join('')+
        '</div></div>';
    }

    const qhtml=qs.map(([key,q],i)=>{
      let body;
      if(q.type==='text'){
        body='<ul class="txts">'+((q.texts||[]).length?(q.texts||[]).map(t=>'<li>'+esc(t)+'</li>').join(''):'<li style="color:#8b93a7">응답 없음</li>')+'</ul>';
      } else { body=barChart(q.counts||{},q.n,i); }
      return '<div class="q"><div class="qlab">'+esc(q.label||key)+'</div>'+
        '<div class="qmeta">'+esc(q.type)+' · 응답 '+q.n+'건</div>'+body+'</div>';
    }).join('');

    document.getElementById('app').innerHTML =
      '<h1>'+esc(d.title||'설문 관리')+'</h1>'+
      '<div class="meta">@'+esc(bot||'(이 봇)')+' · 총 응답 '+(d.total||0)+'건'+(m.first_date?' · '+esc(m.first_date)+' ~ '+esc(m.last_date):'')+'</div>'+
      '<div class="cards">'+
        card('총 응답', (d.total||0)+'<small>건</small>')+
        card('평균 소요시간', (m.avg_duration_sec!=null?m.avg_duration_sec:'—')+'<small>초</small>')+
        card('종합 신뢰', (trust!=null?trust:'—')+'<small>% 예</small>')+
        card('문항 수', qs.length+'<small>개</small>')+
      '</div>'+
      daily+
      (qs.length?('<div class="section"><h2>// QUESTION_RESULTS</h2>'+qhtml+'</div>'):'<p class="empty">아직 설문 결과가 없어요.</p>');
  }
  function card(k,v){ return '<div class="card"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>'; }

  async function load(){
    document.getElementById('who').textContent = (userName()? userName()+'님 (관리자)':'');
    if(!token()){ gate(); return; }
    const d = await call('survey_summary_bot', bot?{owner_id:bot}:{});
    render(d);
  }
  load();
</script>
</body>
</html>
